listen              1935;
max_connections     1000;
daemon              off;
http_api {
    enabled         on;
    listen          1985;
}
http_server {
    enabled         on;
    listen          8080;
}
vhost __defaultVhost__ {
    # 开启 HTTP-FLV 拉流，观众看直播就靠它
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    
    # Webhook 回调配置
    http_hooks {
        enabled         on;
        # ！！！核心修改：穿透 Docker 访问宿主机的 HTTP 端口！！！
        on_publish      http://host.docker.internal:5200/api/liverooms/srs/on_publish/;
        on_unpublish    http://host.docker.internal:5200/api/liverooms/srs/on_unpublish/;
    }
}